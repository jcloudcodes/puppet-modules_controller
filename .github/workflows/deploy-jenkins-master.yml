name: Deploy Jenkins Master Puppet Module

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'cbjenkins/jenkins_master/**'
      - '.github/workflows/deploy-jenkins-master.yml'
      - 'ci-cd/cbjenkins/deploy_jenkins_master.sh'
  workflow_dispatch:

jobs:
  git-check:
    name: Git Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify module path exists
        run: |
          test -d cbjenkins/jenkins_master

      - name: Show commit details
        run: |
          git rev-parse HEAD
          git log -1 --stat -- cbjenkins/jenkins_master

  validate:
    name: Validate Puppet Module
    runs-on: ubuntu-latest
    needs: git-check
    env:
      MODULE_SOURCE: cbjenkins/jenkins_master
      REMOTE_HOST: puppet.jcloudcodes.com
      REMOTE_USER: ${{ secrets.PUPPET_FOREMAN_USER }}
      REMOTE_PATH: /etc/puppetlabs/code/environments/production/modules/jenkins_master
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          test -f "$MODULE_SOURCE/manifests/init.pp"
          test -f "$MODULE_SOURCE/manifests/install.pp"

      - name: Validate Puppet manifests locally
        run: |
          if command -v ruby >/dev/null 2>&1; then
            find "$MODULE_SOURCE/manifests" -name '*.pp' -print
          fi

  deploy:
    name: Deploy to Puppet Foreman
    runs-on: ubuntu-latest
    needs: validate
    env:
      MODULE_SOURCE: cbjenkins/jenkins_master
      REMOTE_HOST: puppet.jcloudcodes.com
      REMOTE_USER: ${{ secrets.PUPPET_FOREMAN_USER }}
      REMOTE_PATH: /etc/puppetlabs/code/environments/production/modules/jenkins_master
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PUPPET_FOREMAN_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$REMOTE_HOST" >> ~/.ssh/known_hosts

      - name: Backup existing remote module
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          ssh "${REMOTE_USER}@${REMOTE_HOST}" \
            "if [ -d ${REMOTE_PATH} ]; then backup_dir=/tmp/jenkins_master_backup_${GITHUB_SHA}_\$(date +%Y%m%d%H%M%S); mkdir -p \"\$backup_dir\"; rsync -az ${REMOTE_PATH}/ \"\$backup_dir\"/; echo \"Backup created at \$backup_dir\"; fi"

      - name: Sync Jenkins module to Puppet Foreman
        run: |
          ssh "${REMOTE_USER}@${REMOTE_HOST}" "mkdir -p ${REMOTE_PATH}"
          rsync -az --delete \
            "$MODULE_SOURCE"/ \
            "${REMOTE_USER}@${REMOTE_HOST}:${REMOTE_PATH}/"

      - name: Copy remote deployment script
        run: |
          rsync -az \
            "ci-cd/cbjenkins/deploy_jenkins_master.sh" \
            "${REMOTE_USER}@${REMOTE_HOST}:/tmp/deploy_jenkins_master.sh"

      - name: Run remote deployment validation
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          ssh "${REMOTE_USER}@${REMOTE_HOST}" \
            "chmod +x /tmp/deploy_jenkins_master.sh && GITHUB_SHA=${GITHUB_SHA} /bin/bash /tmp/deploy_jenkins_master.sh && rm -f /tmp/deploy_jenkins_master.sh"
