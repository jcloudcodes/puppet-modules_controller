name: Deploy Tomcat Puppet Module

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'puppet-modules_packagings/cbtom-cat/**'
      - '.github/workflows/deploy-tomcat.yml'
      - 'ci-cd/github_action/cbtom-cat/deploy_tomcat.sh'
  workflow_dispatch:

jobs:
  git-check:
    name: Git Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify module path exists
        run: |
          test -d puppet-modules_packagings/cbtom-cat

      - name: Show commit details
        run: |
          git rev-parse HEAD
          git log -1 --stat -- puppet-modules_packagings/cbtom-cat

  validate:
    name: Validate Puppet Module
    runs-on: ubuntu-latest
    needs: git-check
    env:
      MODULE_SOURCE: puppet-modules_packagings/cbtom-cat
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          test -f "$MODULE_SOURCE/manifests/init.pp"
          test -f "$MODULE_SOURCE/manifests/install.pp"
          test -f "$MODULE_SOURCE/manifests/config.pp"

      - name: Validate Puppet manifests locally
        run: |
          find "$MODULE_SOURCE/manifests" -name '*.pp' -print

  prepare-remote:
    name: Prepare Remote Path
    runs-on: ubuntu-latest
    needs: validate
    env:
      REMOTE_HOST: puppet.jcloudcodes.com
      REMOTE_USER: ${{ secrets.PUPPET_FOREMAN_USER }}
      REMOTE_PATH: /etc/puppetlabs/code/environments/production/modules/tom_cat
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PUPPET_FOREMAN_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$REMOTE_HOST" >> ~/.ssh/known_hosts

      - name: Create remote module path
        run: |
          ssh "${REMOTE_USER}@${REMOTE_HOST}" \
            "sudo mkdir -p ${REMOTE_PATH} && sudo chown -R ${REMOTE_USER}:${REMOTE_USER} ${REMOTE_PATH}"

      - name: Backup existing remote module
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          ssh "${REMOTE_USER}@${REMOTE_HOST}" \
            "if [ -d ${REMOTE_PATH} ]; then backup_dir=/tmp/tom_cat_backup_${GITHUB_SHA}_\$(date +%Y%m%d%H%M%S); mkdir -p \"\$backup_dir\"; rsync -az ${REMOTE_PATH}/ \"\$backup_dir\"/; echo \"Backup created at \$backup_dir\"; fi"

  deploy:
    name: Deploy to Puppet Foreman
    runs-on: ubuntu-latest
    needs: prepare-remote
    env:
      MODULE_SOURCE: puppet-modules_packagings/cbtom-cat
      REMOTE_HOST: puppet.jcloudcodes.com
      REMOTE_USER: ${{ secrets.PUPPET_FOREMAN_USER }}
      REMOTE_PATH: /etc/puppetlabs/code/environments/production/modules/tom_cat
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PUPPET_FOREMAN_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$REMOTE_HOST" >> ~/.ssh/known_hosts

      - name: Sync Tomcat module to Puppet Foreman
        run: |
          rsync -az --delete \
            "$MODULE_SOURCE"/ \
            "${REMOTE_USER}@${REMOTE_HOST}:${REMOTE_PATH}/"

      - name: Copy remote deployment script
        run: |
          rsync -az \
            "ci-cd/github_action/cbtom-cat/deploy_tomcat.sh" \
            "${REMOTE_USER}@${REMOTE_HOST}:/tmp/deploy_tomcat.sh"

      - name: Run remote deployment validation
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          ssh "${REMOTE_USER}@${REMOTE_HOST}" \
            "chmod +x /tmp/deploy_tomcat.sh && GITHUB_SHA=${GITHUB_SHA} /bin/bash /tmp/deploy_tomcat.sh && rm -f /tmp/deploy_tomcat.sh"
