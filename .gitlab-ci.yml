stages:
  - validate
  - deploy

default:
  image: alpine:3.20
  before_script:
    - apk add --no-cache bash git openssh-client rsync
    - install -m 700 -d ~/.ssh
    - printf '%s\n' "$PUPPET_FOREMAN_SSH_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$REMOTE_HOST" >> ~/.ssh/known_hosts

variables:
  REMOTE_HOST: puppet.jcloudcodes.com

.validate_module:
  stage: validate
  script:
    - test -f "$MODULE_SOURCE/manifests/init.pp"
    - test -f "$MODULE_SOURCE/manifests/install.pp"
    - find "$MODULE_SOURCE/manifests" -name '*.pp' -print

.deploy_module:
  stage: deploy
  script:
    - bash ci-cd/gitlab-ci/deploy_module.sh "$MODULE_SOURCE" "$REMOTE_PATH" "$PUPPET_FOREMAN_USER" "$REMOTE_HOST" "$REMOTE_VALIDATION_SCRIPT" "$CI_COMMIT_SHA"

validate_cb_jenkins:
  extends: .validate_module
  variables:
    MODULE_SOURCE: puppet-modules_packagings/cbjenkins
  rules:
    - changes:
        - puppet-modules_packagings/cbjenkins/**
        - ci-cd/gitlab-ci/**
        - ci-cd/github_action/cbjenkins/deploy_cb_jenkins.sh
        - .gitlab-ci.yml

deploy_cb_jenkins:
  extends: .deploy_module
  needs:
    - validate_cb_jenkins
  variables:
    MODULE_SOURCE: puppet-modules_packagings/cbjenkins
    REMOTE_PATH: /etc/puppetlabs/code/environments/production/modules/cb_jenkins
    REMOTE_VALIDATION_SCRIPT: ci-cd/github_action/cbjenkins/deploy_cb_jenkins.sh
  rules:
    - changes:
        - puppet-modules_packagings/cbjenkins/**
        - ci-cd/gitlab-ci/**
        - ci-cd/github_action/cbjenkins/deploy_cb_jenkins.sh
        - .gitlab-ci.yml

